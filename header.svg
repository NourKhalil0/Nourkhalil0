<svg xmlns="http://www.w3.org/2000/svg" width="900" height="350" viewBox="0 0 900 350">
  <defs>
    <!-- Command typewriter clip -->
    <clipPath id="cmd-clip">
      <rect x="65" y="60" height="25" width="0">
        <animate attributeName="width" calcMode="discrete"
                 values="0;8;16;24;32;40;48;56;64;72;80;88;96;104;112;120;128;136;144;152;160;168;176;184;192;200;208;216;224;232;240;248;256;264;272;280;288;296;304;312;320;328;336;344;352"
                 dur="3.5s" begin="0.8s" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Name typewriter clip — no keyTimes, evenly spaced: type(17) + pause(8) + delete(16) + pause(5) = 46 values -->
    <clipPath id="name-clip">
      <rect x="315" y="170" height="40" width="0">
        <animate attributeName="width" calcMode="discrete"
                 values="0;17;34;51;68;85;102;119;136;153;170;187;204;221;238;255;272;272;272;272;272;272;272;272;272;255;238;221;204;187;170;153;136;119;102;85;68;51;34;17;0;0;0;0;0;0"
                 dur="10s" repeatCount="indefinite" begin="10.5s"/>
      </rect>
    </clipPath>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="2" fill="#22c55e" opacity="0.012"/>
    </pattern>
  </defs>

  <!-- ======== BACKGROUND ======== -->
  <rect width="900" height="350" fill="#0a0e17"/>
  <rect width="900" height="350" fill="url(#scanlines)"/>

  <!-- ======== TITLE BAR ======== -->
  <rect width="900" height="30" fill="#111922"/>
  <circle cx="18" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="15" r="5" fill="#febc2e"/>
  <circle cx="54" cy="15" r="5" fill="#28c840"/>
  <text x="450" y="19" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58" text-anchor="middle">nour@soc-analyst:~/threat-monitor</text>
  <line x1="0" y1="30" x2="900" y2="30" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- ======== INTRO SEQUENCE (fades at 9.5s) ======== -->
  <g font-family="'Courier New', Courier, monospace" font-size="13">
    <animate attributeName="opacity" from="1" to="0" begin="9.5s" dur="0.4s" fill="freeze"/>

    <!-- Kali prompt -->
    <text x="25" y="58" fill="#22c55e">┌──(nour㉿soc-ops)─[~/siem]</text>
    <text x="25" y="78" fill="#22c55e">└─$</text>

    <!-- Command typed char-by-char -->
    <g clip-path="url(#cmd-clip)">
      <text x="65" y="78" fill="#e6edf3">python3 threat_detector.py --live --src=all</text>
    </g>

    <!-- Typing cursor -->
    <g>
      <animate attributeName="opacity" from="1" to="0" begin="4.5s" dur="0.1s" fill="freeze"/>
      <rect x="65" y="65" width="2" height="16" fill="#22c55e">
        <animate attributeName="opacity" values="1;0" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="x" calcMode="discrete"
                 values="65;73;81;89;97;105;113;121;129;137;145;153;161;169;177;185;193;201;209;217;225;233;241;249;257;265;273;281;289;297;305;313;321;329;337;345;353;361;369;377;385;393;401;409;417"
                 dur="3.5s" begin="0.8s" fill="freeze"/>
      </rect>
    </g>

    <!-- [*] Initializing (4.8s) -->
    <text x="25" y="110" fill="#8b949e" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.3s" fill="freeze"/>[*] Initializing SIEM Threat Detection Engine v4.2</text>

    <!-- Loading spinner using stroke-dashoffset (no animateTransform) -->
    <circle cx="440" cy="106" r="5" fill="none" stroke="#4493f8" stroke-width="2" stroke-dasharray="20 12" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" dur="1s" begin="4.8s" fill="freeze"/>
      <animate attributeName="stroke-dashoffset" from="0" to="32" dur="0.8s" repeatCount="indefinite" begin="4.8s"/>
    </circle>

    <!-- [✓] Connected (5.8s) -->
    <text x="25" y="132" fill="#4493f8" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="5.8s" dur="0.3s" fill="freeze"/>[✓] Connected: Splunk | Wazuh | Suricata | Zeek</text>

    <!-- [*] Scanning (6.5s) -->
    <text x="25" y="154" fill="#8b949e" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="6.5s" dur="0.3s" fill="freeze"/>[*] Scanning 2,847 events/sec across 12 endpoints ...</text>

    <!-- Separator (7.0s) -->
    <line x1="25" y1="170" x2="620" y2="170" stroke="#1e3a5f" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" begin="7.0s" dur="0.2s" fill="freeze"/>
    </line>

    <!-- ▲ CRITICAL blinking (7.4s) -->
    <text x="25" y="195" fill="#f85149" font-weight="bold" font-size="15" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="7.4s" dur="0.15s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.08;1" dur="0.5s" repeatCount="4" begin="7.6s"/>
      ▲ CRITICAL</text>
    <text x="165" y="195" fill="#e6edf3" font-size="13" opacity="0"><animate attributeName="opacity" from="0" to="0.9" begin="7.4s" dur="0.3s" fill="freeze"/>Brute-force SSH detected → 10.0.0.47 → 1,243 attempts/5min</text>
  </g>

  <!-- ======== NAME (appears ONLY after intro is gone) ======== -->
  <g opacity="0">
    <set attributeName="opacity" to="1" begin="10.2s" fill="freeze"/>

    <!-- Name with typewriter clip -->
    <g clip-path="url(#name-clip)">
      <text x="315" y="200" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="bold" fill="#22c55e">NOUR KHALIL RASH</text>
    </g>

    <!-- Cursor -->
    <rect x="315" y="180" width="2" height="26" fill="#22c55e">
      <animate attributeName="opacity" values="1;0" dur="0.7s" repeatCount="indefinite" begin="10.2s"/>
      <animate attributeName="x" calcMode="discrete"
               values="315;332;349;366;383;400;417;434;451;468;485;502;519;536;553;570;587;587;587;587;587;587;587;587;587;570;553;536;519;502;485;468;451;434;417;400;383;366;349;332;315;315;315;315;315;315"
               dur="10s" repeatCount="indefinite" begin="10.5s"/>
    </rect>

    <!-- Subtitle -->
    <text x="450" y="235" font-family="'Courier New', Courier, monospace" font-size="13" fill="#4493f8" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" from="0" to="0.8" begin="16s" dur="0.5s" fill="freeze"/>
      Security Analyst · SOC Engineer · Oslo</text>
  </g>
</svg>