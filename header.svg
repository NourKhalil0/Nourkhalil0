<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-name">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Command typewriter clip — 45 discrete steps (1 per char) -->
    <clipPath id="cmd-clip">
      <rect x="65" y="60" height="25" width="0">
        <animate attributeName="width"
                 calcMode="discrete"
                 values="0;8;16;24;32;40;48;56;64;72;80;88;96;104;112;120;128;136;144;152;160;168;176;184;192;200;208;216;224;232;240;248;256;264;272;280;288;296;304;312;320;328;336;344;352"
                 dur="2.2s" begin="0.8s" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Name typewriter clip — 35 discrete steps: type → pause → delete → pause → loop -->
    <clipPath id="name-clip">
      <rect x="315" y="178" height="42" width="0">
        <animate attributeName="width"
                 calcMode="discrete"
                 values="0;17;34;51;68;85;102;119;136;153;170;187;204;221;238;255;272;272;255;238;221;204;187;170;153;136;119;102;85;68;51;34;17;0;0"
                 keyTimes="0;0.026;0.052;0.078;0.104;0.130;0.156;0.182;0.208;0.234;0.260;0.286;0.313;0.339;0.365;0.391;0.417;0.617;0.633;0.649;0.664;0.680;0.695;0.711;0.727;0.742;0.758;0.773;0.789;0.805;0.820;0.836;0.851;0.867;1"
                 dur="6s"
                 repeatCount="indefinite"
                 begin="9s"/>
      </rect>
    </clipPath>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="2" fill="#22c55e" opacity="0.012"/>
    </pattern>
  </defs>

  <!-- ======== BACKGROUND ======== -->
  <rect width="900" height="400" fill="#0a0e17"/>
  <rect width="900" height="400" fill="url(#scanlines)"/>

  <!-- ======== TITLE BAR ======== -->
  <rect width="900" height="30" fill="#111922"/>
  <circle cx="18" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="15" r="5" fill="#febc2e"/>
  <circle cx="54" cy="15" r="5" fill="#28c840"/>
  <text x="450" y="19" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58" text-anchor="middle">nour@soc-analyst:~/threat-monitor</text>
  <line x1="0" y1="30" x2="900" y2="30" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- ======== INTRO SEQUENCE (plays once, fades at 8s) ======== -->
  <g font-family="'Courier New', Courier, monospace" font-size="13">
    <animate attributeName="opacity" from="1" to="0" begin="8s" dur="0.4s" fill="freeze"/>

    <!-- Kali prompt -->
    <text x="25" y="58" fill="#22c55e" filter="url(#glow)">┌──(nour㉿soc-ops)─[~/siem]</text>
    <text x="25" y="78" fill="#22c55e" filter="url(#glow)">└─$</text>

    <!-- Command typed char-by-char -->
    <g clip-path="url(#cmd-clip)">
      <text x="65" y="78" fill="#e6edf3">python3 threat_detector.py --live --src=all</text>
    </g>

    <!-- Blinking cursor that steps with each character -->
    <g>
      <animate attributeName="opacity" from="1" to="0" begin="3.2s" dur="0.1s" fill="freeze"/>
      <rect x="65" y="65" width="2" height="16" fill="#22c55e">
        <animate attributeName="opacity" values="1;0" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="x"
                 calcMode="discrete"
                 values="65;73;81;89;97;105;113;121;129;137;145;153;161;169;177;185;193;201;209;217;225;233;241;249;257;265;273;281;289;297;305;313;321;329;337;345;353;361;369;377;385;393;401;409;417"
                 dur="2.2s" begin="0.8s" fill="freeze"/>
      </rect>
    </g>

    <!-- [*] Initializing (3.5s) -->
    <text x="25" y="110" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.4s" fill="freeze"/>
      <animate attributeName="fill" from="#0a0e17" to="#8b949e" begin="3.5s" dur="0.6s" fill="freeze"/>
      [*] Initializing SIEM Threat Detection Engine v4.2 ...
    </text>

    <!-- [✓] Connected (4.2s) -->
    <text x="25" y="132" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.4s" fill="freeze"/>
      <animate attributeName="fill" from="#0a0e17" to="#4493f8" begin="4.2s" dur="0.6s" fill="freeze"/>
      [✓] Connected: Splunk | Wazuh | Suricata | Zeek
    </text>

    <!-- [*] Scanning (4.9s) -->
    <text x="25" y="154" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.9s" dur="0.4s" fill="freeze"/>
      <animate attributeName="fill" from="#0a0e17" to="#8b949e" begin="4.9s" dur="0.6s" fill="freeze"/>
      [*] Scanning 2,847 events/sec across 12 endpoints ...
    </text>

    <!-- Separator (5.5s) -->
    <line x1="25" y1="170" x2="620" y2="170" stroke="#1e3a5f" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" begin="5.5s" dur="0.2s" fill="freeze"/>
    </line>

    <!-- ▲ CRITICAL — blinking red (5.9s) -->
    <text x="25" y="195" fill="#f85149" font-weight="bold" font-size="15" filter="url(#glow-red)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.9s" dur="0.15s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.08;1" dur="0.5s" repeatCount="4" begin="6.1s"/>
      ▲ CRITICAL
    </text>
    <text x="165" y="195" fill="#e6edf3" font-size="13" opacity="0">
      <animate attributeName="opacity" from="0" to="0.9" begin="5.9s" dur="0.3s" fill="freeze"/>
      Brute-force SSH detected → 10.0.0.47 → 1,243 attempts/5min
    </text>
  </g>

  <!-- ======== NAME SECTION (loops after intro clears) ======== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="8.8s" dur="0.5s" fill="freeze"/>

    <!-- Name typed char-by-char, then deleted, looping -->
    <g clip-path="url(#name-clip)">
      <text x="315" y="212" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="bold" fill="#22c55e" filter="url(#glow-name)">NOUR KHALIL RASH</text>
    </g>

    <!-- Cursor that steps with each name character -->
    <rect x="315" y="192" width="2" height="26" fill="#22c55e">
      <animate attributeName="opacity" values="1;0" dur="0.7s" repeatCount="indefinite" begin="9s"/>
      <animate attributeName="x"
               calcMode="discrete"
               values="315;332;349;366;383;400;417;434;451;468;485;502;519;536;553;570;587;587;570;553;536;519;502;485;468;451;434;417;400;383;366;349;332;315;315"
               keyTimes="0;0.026;0.052;0.078;0.104;0.130;0.156;0.182;0.208;0.234;0.260;0.286;0.313;0.339;0.365;0.391;0.417;0.617;0.633;0.649;0.664;0.680;0.695;0.711;0.727;0.742;0.758;0.773;0.789;0.805;0.820;0.836;0.851;0.867;1"
               dur="6s"
               repeatCount="indefinite"
               begin="9s"/>
    </rect>

    <!-- Subtitle (appears once and stays) -->
    <text x="450" y="248" font-family="'Courier New', Courier, monospace" font-size="13" fill="#4493f8" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" from="0" to="0.8" begin="11.5s" dur="0.5s" fill="freeze"/>
      Security Analyst · SOC Engineer · Oslo
    </text>

    <!-- Decorative line -->
    <line x1="310" y1="260" x2="590" y2="260" stroke="#1e3a5f" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="0.4" begin="12s" dur="0.5s" fill="freeze"/>
    </line>
  </g>
</svg>