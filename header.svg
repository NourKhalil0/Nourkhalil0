<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Command typewriter clip — 45 discrete steps (1 per char), slower -->
    <clipPath id="cmd-clip">
      <rect x="65" y="60" height="25" width="0">
        <animate attributeName="width"
                 calcMode="discrete"
                 values="0;8;16;24;32;40;48;56;64;72;80;88;96;104;112;120;128;136;144;152;160;168;176;184;192;200;208;216;224;232;240;248;256;264;272;280;288;296;304;312;320;328;336;344;352"
                 dur="3.5s" begin="0.8s" fill="freeze"/>
      </rect>
    </clipPath>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="2" fill="#22c55e" opacity="0.012"/>
    </pattern>
  </defs>

  <!-- ======== BACKGROUND ======== -->
  <rect width="900" height="220" fill="#0a0e17"/>
  <rect width="900" height="220" fill="url(#scanlines)"/>

  <!-- ======== TITLE BAR ======== -->
  <rect width="900" height="30" fill="#111922"/>
  <circle cx="18" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="15" r="5" fill="#febc2e"/>
  <circle cx="54" cy="15" r="5" fill="#28c840"/>
  <text x="450" y="19" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58" text-anchor="middle">nour@soc-analyst:~/threat-monitor</text>
  <line x1="0" y1="30" x2="900" y2="30" stroke="#1e3a5f" stroke-width="0.5"/>

  <!-- ======== INTRO SEQUENCE (plays once, fades at 9s) ======== -->
  <g font-family="'Courier New', Courier, monospace" font-size="13">
    <animate attributeName="opacity" from="1" to="0" begin="9s" dur="0.4s" fill="freeze"/>

    <!-- Kali prompt -->
    <text x="25" y="58" fill="#22c55e" filter="url(#glow)">┌──(nour㉿soc-ops)─[~/siem]</text>
    <text x="25" y="78" fill="#22c55e" filter="url(#glow)">└─$</text>

    <!-- Command typed char-by-char (slower: 3.5s for 44 chars ≈ 80ms/char) -->
    <g clip-path="url(#cmd-clip)">
      <text x="65" y="78" fill="#e6edf3">python3 threat_detector.py --live --src=all</text>
    </g>

    <!-- Blinking cursor steps with each character -->
    <g>
      <animate attributeName="opacity" from="1" to="0" begin="4.5s" dur="0.1s" fill="freeze"/>
      <rect x="65" y="65" width="2" height="16" fill="#22c55e">
        <animate attributeName="opacity" values="1;0" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="x"
                 calcMode="discrete"
                 values="65;73;81;89;97;105;113;121;129;137;145;153;161;169;177;185;193;201;209;217;225;233;241;249;257;265;273;281;289;297;305;313;321;329;337;345;353;361;369;377;385;393;401;409;417"
                 dur="3.5s" begin="0.8s" fill="freeze"/>
      </rect>
    </g>

    <!-- [*] Initializing (4.8s) -->
    <text x="25" y="110" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.4s" fill="freeze"/>
      <animate attributeName="fill" from="#0a0e17" to="#8b949e" begin="4.8s" dur="0.6s" fill="freeze"/>
      [*] Initializing SIEM Threat Detection Engine v4.2 ...
    </text>

    <!-- [✓] Connected (5.5s) -->
    <text x="25" y="132" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="5.5s" dur="0.4s" fill="freeze"/>
      <animate attributeName="fill" from="#0a0e17" to="#4493f8" begin="5.5s" dur="0.6s" fill="freeze"/>
      [✓] Connected: Splunk | Wazuh | Suricata | Zeek
    </text>

    <!-- [*] Scanning (6.2s) -->
    <text x="25" y="154" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="6.2s" dur="0.4s" fill="freeze"/>
      <animate attributeName="fill" from="#0a0e17" to="#8b949e" begin="6.2s" dur="0.6s" fill="freeze"/>
      [*] Scanning 2,847 events/sec across 12 endpoints ...
    </text>

    <!-- Separator (6.8s) -->
    <line x1="25" y1="170" x2="620" y2="170" stroke="#1e3a5f" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" from="0" to="0.6" begin="6.8s" dur="0.2s" fill="freeze"/>
    </line>

    <!-- ▲ CRITICAL — blinking red (7.2s) -->
    <text x="25" y="195" fill="#f85149" font-weight="bold" font-size="15" filter="url(#glow-red)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="7.2s" dur="0.15s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.08;1" dur="0.5s" repeatCount="4" begin="7.4s"/>
      ▲ CRITICAL
    </text>
    <text x="165" y="195" fill="#e6edf3" font-size="13" opacity="0">
      <animate attributeName="opacity" from="0" to="0.9" begin="7.2s" dur="0.3s" fill="freeze"/>
      Brute-force SSH detected → 10.0.0.47 → 1,243 attempts/5min
    </text>
  </g>
</svg>